name: Container Publish (GHCR)

on:
  push:
    branches: [ "main" ]
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_BACKEND: taskapi
  IMAGE_FRONTEND: taskweb

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      # -------------------------
      # Checkout
      # -------------------------
      - name: Checkout
        uses: actions/checkout@v4

      # -------------------------
      # Compute image names
      # -------------------------
      - name: Compute image base
        shell: bash
        run: |
          OWNER_LC="${GITHUB_REPOSITORY_OWNER,,}"
          echo "IMAGE_BACKEND_FULL=${REGISTRY}/${OWNER_LC}/${IMAGE_BACKEND}" >> $GITHUB_ENV
          echo "IMAGE_FRONTEND_FULL=${REGISTRY}/${OWNER_LC}/${IMAGE_FRONTEND}" >> $GITHUB_ENV

      # -------------------------
      # Login GHCR
      # -------------------------
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # =========================
      # BACKEND
      # =========================
      - name: Metadata (backend)
        id: meta_backend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_BACKEND_FULL }}
          tags: |
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=tag

      - name: Build backend image
        uses: docker/build-push-action@v6
        with:
          context: app/backend/TaskApi
          file: app/backend/TaskApi/Containerfile
          push: false
          tags: ${{ steps.meta_backend.outputs.tags }}

      - name: Trivy scan (backend)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.IMAGE_BACKEND_FULL }}:latest
          severity: CRITICAL
          exit-code: 1
          ignore-unfixed: true

      - name: Push backend image
        uses: docker/build-push-action@v6
        with:
          context: app/backend/TaskApi
          file: app/backend/TaskApi/Containerfile
          push: true
          tags: ${{ steps.meta_backend.outputs.tags }}
          labels: ${{ steps.meta_backend.outputs.labels }}

      # =========================
      # FRONTEND
      # =========================
      - name: Metadata (frontend)
        id: meta_frontend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_FRONTEND_FULL }}
          tags: |
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=tag

      - name: Build frontend image
        uses: docker/build-push-action@v6
        with:
          context: app/frontend/task-web
          file: app/frontend/task-web/Containerfile
          push: false
          tags: ${{ steps.meta_frontend.outputs.tags }}

      - name: Trivy scan (frontend)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.IMAGE_FRONTEND_FULL }}:latest
          severity: CRITICAL
          exit-code: 1
          ignore-unfixed: true

      - name: Push frontend image
        uses: docker/build-push-action@v6
        with:
          context: app/frontend/task-web
          file: app/frontend/task-web/Containerfile
          push: true
          tags: ${{ steps.meta_frontend.outputs.tags }}
          labels: ${{ steps.meta_frontend.outputs.labels }}

      # =========================
      # CHATOPS - SLACK
      # =========================
      - name: Notify Slack (success)
        if: success()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          if [ -z "$SLACK_WEBHOOK_URL" ]; then
            echo "❌ SLACK_WEBHOOK_URL is not set"
            exit 1
          fi

          curl -X POST -H "Content-Type: application/json" \
            -d "{
              \"text\": \"✅ CD SUCCESS\nRepository: ${{ github.repository }}\nBranch: ${{ github.ref_name }}\nCommit: ${{ github.sha }}\nWorkflow: ${{ github.workflow }}\"
            }" \
            "$SLACK_WEBHOOK_URL"

      - name: Notify Slack (failure)
        if: failure()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          if [ -z "$SLACK_WEBHOOK_URL" ]; then
            echo "❌ SLACK_WEBHOOK_URL is not set"
            exit 1
          fi

          curl -X POST -H "Content-Type: application/json" \
            -d "{
              \"text\": \"❌ CD FAILED\nRepository: ${{ github.repository }}\nBranch: ${{ github.ref_name }}\nCommit: ${{ github.sha }}\nWorkflow: ${{ github.workflow }}\"
            }" \
            "$SLACK_WEBHOOK_URL"