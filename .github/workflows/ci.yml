name: CI - Build & Test

on:
  pull_request:
    branches: [ "develop" ]
  push:
    branches: [ "develop" ]

jobs:
  ci:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      # -------------------------
      # Checkout
      # -------------------------
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # necesario para SonarCloud

      # =========================
      # Backend (.NET)
      # =========================
      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore backend
        run: |
          cd app/backend/TaskApi
          dotnet restore

      - name: Build backend
        run: |
          cd app/backend/TaskApi
          dotnet build --configuration Release --no-restore

      # =========================
      # Frontend (Angular)
      # =========================
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: app/frontend/task-web/package-lock.json

      - name: Install frontend deps
        run: |
          cd app/frontend/task-web
          npm ci

      - name: Build frontend
        run: |
          cd app/frontend/task-web
          npm run build

  sonarcloud:
    name: SonarCloud Analysis
    runs-on: ubuntu-latest
    needs: ci

    steps:
      # -------------------------
      # Checkout (full history)
      # -------------------------
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # -------------------------
      # SonarCloud Scan
      # -------------------------
      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@v2
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.organization=marco0705
            -Dsonar.projectKey=Marco0705_task-app
            -Dsonar.sources=app
            -Dsonar.exclusions=**/node_modules/**,**/dist/**,**/*.spec.ts