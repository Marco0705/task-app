replicaCount: 1

image:
  repository: ghcr.io/marco0705/taskapi
  pullPolicy: IfNotPresent
  tag: latest

service:
  type: ClusterIP
  port: 8080

env:
  ASPNETCORE_ENVIRONMENT: "Development"
  ConnectionStrings__Default: "Data Source=/data/task.db"

  # OpenTelemetry
  OTEL_EXPORTER_OTLP_ENDPOINT: "http://otel-collector:4317"
  OTEL_SERVICE_NAME: "taskapi"

resources:
  requests:
    cpu: "100m"
    memory: "128Mi"
  limits:
    cpu: "500m"
    memory: "256Mi"

volume:
  enabled: true
  mountPath: /data
